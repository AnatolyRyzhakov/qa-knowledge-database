<svg width="700" height="560" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill:#222; text-anchor: middle;}
.label { font-family: Arial, sans-serif; font-size: 17px; font-weight: bold; fill:#222; text-anchor: middle;}
.text { font-family: Arial, sans-serif; font-size: 14px; fill:#222; text-anchor: middle;}
</style>

<!-- Title -->
<text x="350" y="50" class="title">Классическая пирамида тестирования</text>

<!-- Bottom Layer (Unit) -->
<polygon points="60,520 640,520 520,360 180,360" fill="#2E7D32"/>

<text x="350" y="405" class="label">Unit (Модульные тесты) ~70%</text>
<text x="350" y="430" class="text">База пирамиды. Быстрые, дешевые.</text>
<text x="350" y="455" class="text">Проверяют изолированные функции.</text>
<text x="350" y="480" class="text">Пишутся разработчиками.</text>

<!-- Middle Layer (Integration) -->
<polygon points="180,360 520,360 420,220 280,220" fill="#F9A825"/>

<text x="350" y="265" class="label">Integration / API ~20%</text>
<text x="350" y="295" class="text">Проверяют связь между модулями</text>
<text x="350" y="320" class="text">или работу API без UI.</text>

<!-- Top Layer (E2E) -->
<polygon points="280,220 420,220 350,120" fill="#C62828"/>

<text x="350" y="165" class="label">E2E / UI ~10%</text>
<text x="350" y="190" class="text">Дорогие и медленные.</text>
<text x="350" y="210" class="text">Проверяют систему через браузер.</text>

</svg>
