<svg width="700" height="560" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill:#222; text-anchor: middle;}
.label { font-family: Arial, sans-serif; font-size: 17px; font-weight: bold; fill:#222; text-anchor: middle;}
.text { font-family: Arial, sans-serif; font-size: 14px; fill:#222; text-anchor: middle;}
</style>

<!-- Title -->
<text x="350" y="50" class="title">Ice-Cream Cone Test Anti-Pattern</text>

<!-- Top Layer (E2E/UI) -->
<polygon points="60,140 640,140 520,300 180,300" fill="#C62828"/>

<text x="350" y="190" class="label">E2E / UI Tests</text>
<text x="350" y="215" class="text">Большинство проверок через браузер.</text>
<text x="350" y="240" class="text">Тесты медленные и дорогие.</text>
<text x="350" y="265" class="text">Часто падают из-за сетевых сбоев (Flaky).</text>

<!-- Middle Layer (Integration/API) -->
<polygon points="180,300 520,300 420,410 280,410" fill="#F9A825"/>

<text x="350" y="340" class="label">Integration / API</text>
<text x="350" y="365" class="text">Мало интеграционных проверок.</text>
<text x="350" y="388" class="text">Недостаточно тестирования связей модулей.</text>

<!-- Bottom Layer (Unit) -->
<polygon points="280,410 420,410 350,500" fill="#2E7D32"/>

<text x="350" y="445" class="label">Unit Tests</text>
<text x="350" y="468" class="text">Почти отсутствуют.</text>

</svg>
